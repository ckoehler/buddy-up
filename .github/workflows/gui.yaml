name: Build GUI apps

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:  # Allow manual triggering
    inputs:
      create_test_release:
        description: 'Create a test pre-release'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  build:
    name: Build GUI
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            name: buddy-up-windows-x64
            ext: .exe
          - target: aarch64-apple-darwin
            os: macos-latest
            name: buddy-up-macos-arm64
            ext: ""
          - target: x86_64-apple-darwin
            os: macos-13
            name: buddy-up-macos-x64
            ext: ""

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: gui-${{ matrix.target }}

      - name: Install system dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.0-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Build GUI only
        run: cargo build --release --target ${{ matrix.target }} --package gui

      - name: Create app bundle (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p dist/${{ matrix.name }}.app/Contents/MacOS
          mkdir -p dist/${{ matrix.name }}.app/Contents/Resources
          
          # Copy the executable
          cp target/${{ matrix.target }}/release/gui dist/${{ matrix.name }}.app/Contents/MacOS/buddy-up
          chmod +x dist/${{ matrix.name }}.app/Contents/MacOS/buddy-up
          
          # Create Info.plist
          cat > dist/${{ matrix.name }}.app/Contents/Info.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>buddy-up</string>
              <key>CFBundleIdentifier</key>
              <string>net.zerodeviation.buddy-up</string>
              <key>CFBundleName</key>
              <string>Buddy Up</string>
              <key>CFBundleDisplayName</key>
              <string>Buddy Up</string>
              <key>CFBundleVersion</key>
              <string>1.0.0</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0.0</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>LSMinimumSystemVersion</key>
              <string>10.15</string>
              <key>NSHighResolutionCapable</key>
              <true/>
          </dict>
          </plist>
          EOF
          
          # Create DMG
          hdiutil create -volname "Buddy Up" -srcfolder dist/${{ matrix.name }}.app -ov -format UDZO dist/${{ matrix.name }}.dmg

      - name: Prepare Windows executable
        if: runner.os == 'Windows'
        run: |
          mkdir dist
          copy target\${{ matrix.target }}\release\gui.exe dist\${{ matrix.name }}.exe

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: |
            dist/*${{ matrix.ext }}
            dist/*.dmg
            dist/*.app
          if-no-files-found: error
          retention-days: 30

  create-release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    # Run on tags OR manual workflow dispatch with test release option
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.create_test_release)
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Display structure of downloaded files
        run: find dist -type f

      - name: Determine release info
        id: release_info
        run: |
          if [[ "${{ github.ref }}" =~ ^refs/tags/v ]]; then
            echo "tag_name=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
            echo "release_title=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            # For test releases
            timestamp=$(date +%Y%m%d-%H%M%S)
            echo "tag_name=test-${timestamp}" >> $GITHUB_OUTPUT
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
            echo "release_title=Test Release ${timestamp}" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_info.outputs.tag_name }}
          name: ${{ steps.release_info.outputs.release_title }}
          files: |
            dist/**/*.exe
            dist/**/*.dmg
          draft: false
          prerelease: ${{ steps.release_info.outputs.is_prerelease }}
          body: |
            ${{ github.event_name == 'workflow_dispatch' && '🧪 **This is a test release created manually**' || '' }}
            
            ## Downloads
            - **Windows (x64)**: `buddy-up-windows-x64.exe`
            - **macOS (Apple Silicon)**: `buddy-up-macos-arm64.dmg`
            - **macOS (Intel)**: `buddy-up-macos-x64.dmg`
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
