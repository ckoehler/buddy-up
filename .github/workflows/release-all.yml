name: Integrated Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      create_test_release:
        description: 'Create a test binary release'
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  pull-requests: write

jobs:
  # Version management and crates.io publishing
  release-plz:
    name: Release-plz (Crates)
    runs-on: ubuntu-latest
    # Only run on main branch pushes or manual trigger
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PLZ_TOKEN }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Run release-plz
        uses: MarcoIeni/release-plz-action@v0.5.107
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # Binary distribution via cargo-dist
  cargo-dist:
    name: Binary Release (cargo-dist)
    # Run on tags (created by release-plz) or manual test releases
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.create_test_release)
    uses: ./.github/workflows/release.yml
    secrets: inherit
